<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - ExamUpdates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="openLink('index.html')">Exam<span>Updates</span></div>
            <ul class="nav-links">
                <li><button class="nav-btn" onclick="openLink('index.html')">Home</button></li>
                <li><button class="nav-btn" onclick="openLink('notifications.html')">Notifications</button></li>
                <li><a href="results.html" class="active">Results</a></li>
                <li><button class="nav-btn" onclick="openLink('admit.html')">Admit Card</button></li>
                <li><button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">Exam Results</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Select your exam below to view and download your scorecard.</p>
        
        <div class="card">
            <span class="badge badge-green">Result Active</span>
            <div class="card-date">April 10, 2026</div>
            <h3 class="card-title">JEE Mains Session 2 Results</h3>
            <p class="card-desc">Enter your application number and Date of Birth to view your official NTA scorecard.</p>
            <button class="btn btn-primary" onclick="openLink('https://jeemain.nta.ac.in/')">Go to Official NTA Portal</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ExamUpdates. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
